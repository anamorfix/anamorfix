<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WCBL CSAT/NPS Dashboard</title>
  <style>
    :root{
      --bg:#f6f3ee;
      --card:#ffffff;
      --ink:#0a0a0a;
      --muted:#dcd7d0;
      --line:#c9c4bc;
      --soft:#f0efec;
      --red:#d80f10;
      --red-dark:#c60c0d;
      --shadow:0 10px 28px rgba(0,0,0,.14);
      --radius:30px;
      --header-radius:34px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:"Segoe UI", Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--ink);
      padding:18px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
    }

    .title{
      width:min(1440px,100%);
      font-size:11px;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:#6e6962;
      font-weight:700;
      padding-left:4px;
    }

    .team-grid{
      width:min(1440px,100%);
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      justify-content:center;
    }

    .team-tile{
      width:86px;
      border-radius:12px;
      background:#fff;
      border:2px solid transparent;
      padding:8px 6px 7px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:5px;
      box-shadow:0 2px 8px rgba(0,0,0,.08);
      cursor:pointer;
      transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    }
    .team-tile:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(0,0,0,.12)}
    .team-tile.active{border-color:#101010;box-shadow:0 8px 18px rgba(0,0,0,.16)}
    .team-logo{width:46px;height:46px}
    .team-name{
      font-size:9px;
      line-height:1.15;
      text-align:center;
      font-weight:800;
      color:#232323;
      text-transform:uppercase;
    }

    .dashboard{
      width:min(1440px,100%);
      background:transparent;
    }

    .hero{
      position:relative;
      background:#000;
      border-radius:var(--header-radius);
      min-height:332px;
      padding:34px 360px 30px 44px;
      display:grid;
      align-items:center;
      overflow:visible;
      box-shadow:var(--shadow);
    }

    .hero-main{
      display:grid;
      grid-template-columns:230px 1fr;
      gap:26px;
      align-items:center;
    }

    .score-block{
      align-self:center;
      text-align:left;
    }

    .score-value{
      display:block;
      font-size:132px;
      line-height:.8;
      font-weight:900;
      letter-spacing:-.06em;
      color:#f3f1ef;
    }

    .score-label{
      display:block;
      margin-top:6px;
      margin-left:116px;
      font-size:18px;
      line-height:1;
      color:#d2d0cd;
      font-weight:500;
      letter-spacing:-.02em;
    }

    .team-heading{
      color:#f4f2ef;
      font-size:86px;
      line-height:.9;
      font-weight:800;
      letter-spacing:-.05em;
      white-space:pre-line;
    }

    .logo-wrap{
      position:absolute;
      top:-18px;
      right:20px;
      width:338px;
      height:338px;
      border-radius:50%;
      background:radial-gradient(circle at 35% 30%, rgba(255,255,255,.10), rgba(255,255,255,0) 35%), linear-gradient(135deg, #193c73 0%, #08162d 100%);
      box-shadow:0 0 0 8px #000, 0 12px 30px rgba(0,0,0,.35);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      z-index:3;
    }

    .logo-wrap svg{width:86%;height:86%;display:block}

    .tabs{
      display:flex;
      gap:10px;
      align-items:center;
      padding:12px 14px 10px;
      margin-top:10px;
    }

    .tab{
      border:none;
      border-radius:999px;
      min-width:96px;
      height:30px;
      padding:0 18px;
      font-size:14px;
      font-weight:800;
      letter-spacing:.02em;
      background:#d8d5d0;
      color:#151515;
      cursor:pointer;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.55);
      transition:background .15s ease,color .15s ease,transform .15s ease;
    }
    .tab:hover{transform:translateY(-1px)}
    .tab.active{
      background:linear-gradient(180deg,#e31616 0%, #cb0f10 100%);
      color:#fff;
    }

    .table-frame{
      background:transparent;
      border-radius:20px;
      overflow:hidden;
    }

    .table-wrap{
      border-top:3px solid #232323;
      border-bottom:3px solid #232323;
      background:transparent;
      position:relative;
    }

    .scroll{
      max-height:370px;
      overflow-y:auto;
      scrollbar-width:thin;
      scrollbar-color:#454545 #bfbab3;
    }
    .scroll::-webkit-scrollbar{width:12px}
    .scroll::-webkit-scrollbar-track{background:#c8c3bc}
    .scroll::-webkit-scrollbar-thumb{background:#3f3f3f;border-radius:10px}

    table{
      width:100%;
      border-collapse:separate;
      border-spacing:0 8px;
      table-layout:fixed;
    }

    col.g{width:6.5%}
    col.vs{width:28%}
    col.date{width:11%}
    col.n{width:8%}
    col.metric{width:8.1%}

    thead th{
      position:sticky;
      top:0;
      z-index:2;
      background:var(--bg);
      color:#111;
      font-size:15px;
      font-weight:800;
      text-align:center;
      padding:6px 10px 4px;
      border:none;
    }
    thead th.left{text-align:left}

    tbody tr td{
      background:#ecebea;
      font-size:18px;
      font-weight:600;
      padding:14px 16px;
      text-align:center;
      color:#161616;
      border:none;
    }

    tbody tr td:first-child{
      border-top-left-radius:0;
      border-bottom-left-radius:0;
      text-align:left;
      font-weight:800;
      padding-left:18px;
    }
    tbody tr td:nth-child(2){
      text-align:left;
      font-size:17px;
      font-weight:800;
    }
    tbody tr td:last-child{
      border-top-right-radius:0;
      border-bottom-right-radius:0;
      font-weight:800;
    }

    tbody tr.hi td{
      background:linear-gradient(180deg,var(--red) 0%, var(--red-dark) 100%);
      color:#fff;
    }

    .overall{
      padding-top:12px;
    }

    .overall table{
      border-spacing:0;
    }

    .overall td{
      font-size:24px;
      font-weight:800;
      text-align:center;
      padding:8px 16px 6px;
    }
    .overall .label{
      text-align:right;
      font-size:28px;
      font-weight:800;
      letter-spacing:-.03em;
      width:34.5%;
      padding-right:26px;
    }

    .footer{
      margin-top:18px;
      background:#050505;
      color:#fff;
      min-height:118px;
      border-radius:0;
      padding:16px 24px;
      display:grid;
      grid-template-columns:120px 1fr 240px;
      align-items:center;
      gap:18px;
      box-shadow:var(--shadow);
    }

    .wcbl-mark{
      width:92px;
      height:92px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .footer-copy{
      color:#efefef;
      font-size:15px;
      line-height:1.65;
      font-weight:500;
    }

    .insightrix{
      justify-self:end;
      display:flex;
      align-items:center;
      gap:10px;
      font-size:32px;
      font-weight:700;
      letter-spacing:-.03em;
      color:#fff;
    }
    .insightrix .x{
      font-size:64px;
      font-weight:900;
      line-height:.8;
    }

    @media (max-width:1200px){
      .hero{padding:30px 250px 28px 32px;min-height:280px}
      .hero-main{grid-template-columns:180px 1fr}
      .score-value{font-size:104px}
      .score-label{margin-left:84px;font-size:16px}
      .team-heading{font-size:68px}
      .logo-wrap{width:240px;height:240px;top:-10px;right:14px}
      tbody tr td{font-size:16px}
      .overall td{font-size:20px}
      .overall .label{font-size:24px}
    }

    @media (max-width:860px){
      body{padding:12px}
      .hero{
        padding:24px 22px 26px;
        min-height:auto;
      }
      .hero-main{
        grid-template-columns:1fr;
        gap:14px;
      }
      .score-block{display:flex;align-items:flex-end;gap:8px}
      .score-value{font-size:88px}
      .score-label{margin:0 0 14px 0}
      .team-heading{font-size:54px}
      .logo-wrap{
        position:relative;
        top:auto;right:auto;
        width:170px;height:170px;
        margin:8px 0 0 auto;
      }
      .tabs{padding-left:0}
      .table-wrap{overflow-x:auto}
      .table-frame{min-width:920px}
      .footer{
        grid-template-columns:1fr;
        justify-items:start;
      }
      .insightrix{justify-self:start}
    }
  </style>
</head>

let cur = 0, t = 'h';

function render(){
  const team = TEAMS[cur];
  const rows = team[t];
  document.getElementById('csat').textContent = team.csat;
  document.getElementById('team').textContent = team.name;
  document.getElementById('logo').innerHTML = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${team.logo}</svg>`;

  let body = '';
  rows.forEach(g=>{
    body += `<tr ${g.nps >= 24 ? 'class="hi"' : ''}>
      <td>${g.g}</td>
      <td>${g.vs}</td>
      <td>${g.date}</td>
      <td>${g.n}</td>
      <td>${g.rt}</td>
      <td>${g.a}</td>
      <td>${g.v}</td>
      <td>${g.s}</td>
      <td>${g.f}</td>
      <td>${g.nps}</td>
    </tr>`;
  });
  document.getElementById('body').innerHTML = body;

  let n=0,r=0,a=0,v=0,s=0,f=0,np=0;
  rows.forEach(g=>{
    n += g.n;
    r += g.rt * g.n;
    a += g.a * g.n;
    v += g.v * g.n;
    s += g.s * g.n;
    f += g.f * g.n;
    np += g.nps;
  });

  r = Math.round(r/n);
  a = Math.round(a/n);
  v = Math.round(v/n);
  s = Math.round(s/n);
  f = Math.round(f/n);
  np = Math.round(np/rows.length);

  document.getElementById('ov').innerHTML = `
    <td class="label" colspan="2">Overall</td>
    <td>${n}</td>
    <td>${r}</td>
    <td>${a}</td>
    <td>${v}</td>
    <td>${s}</td>
    <td>${f}</td>
    <td>${np}</td>
  `;
}

function tab(x){
  t = x;
  document.getElementById('h').classList.toggle('active', x === 'h');
  document.getElementById('a').classList.toggle('active', x === 'a');
  render();
}

function sel(i){
  cur = i;
  document.querySelectorAll('.team-tile').forEach((el, idx)=>{
    el.classList.toggle('active', idx === i);
  });
  render();
}

window.onload = () => {
  let tiles = '';
  TEAMS.forEach((team, i)=>{
    tiles += `<div class="team-tile ${i===0 ? 'active' : ''}" onclick="sel(${i})">
      <svg class="team-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${team.logo}</svg>
      <div class="team-name">${team.name.replace(/\\n/g, '<br>')}</div>
    </div>`;
  });
  document.getElementById('teams').innerHTML = tiles;
  render();
};
